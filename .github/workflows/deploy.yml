name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VPS_HOST || 'ods.uz' }}
          port: ${{ vars.VPS_SSH_PORT || 22 }}
          username: ${{ vars.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            bash ${{ vars.DEPLOY_DIR || '/opt/quizmind-platform' }}/scripts/deploy-server.sh \
              --sha "${{ github.sha }}" \
              --ref "main"

      - name: Smoke check — API health
        run: |
          BASE="${{ vars.PRODUCTION_API_URL || 'https://ods.uz/api' }}"
          echo "Waiting for API to be ready..."
          for i in $(seq 1 18); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" "${BASE}/health" || true)
            if [ "$status" = "200" ]; then
              echo "API health passed (HTTP $status)"
              break
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s"
            sleep 10
            if [ "$i" = "18" ]; then
              echo "ERROR: API health failed after 3 minutes"
              exit 1
            fi
          done

      - name: Smoke check — Site homepage
        run: |
          URL="${{ vars.PRODUCTION_APP_URL || 'https://ods.uz' }}"
          echo "Waiting for site to be ready..."
          for i in $(seq 1 18); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" "${URL}" || true)
            if [ "$status" = "200" ]; then
              echo "Site check passed (HTTP $status)"
              break
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s"
            sleep 10
            if [ "$i" = "18" ]; then
              echo "ERROR: Site check failed after 3 minutes"
              exit 1
            fi
          done

      - name: Smoke check — www redirect / homepage
        run: |
          URL="https://www.${{ vars.PRODUCTION_DOMAIN || 'ods.uz' }}"
          echo "Waiting for www redirect to be ready..."
          for i in $(seq 1 18); do
            status=$(curl -sfL -o /dev/null -w "%{http_code}" "${URL}" || true)
            if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
              echo "www check passed (HTTP $status)"
              break
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s"
            sleep 10
            if [ "$i" = "18" ]; then
              echo "ERROR: www check failed after 3 minutes"
              exit 1
            fi
          done

      - name: Collect failure diagnostics
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VPS_HOST || 'ods.uz' }}
          port: ${{ vars.VPS_SSH_PORT || 22 }}
          username: ${{ vars.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            cd ${{ vars.DEPLOY_DIR || '/opt/quizmind-platform' }}
            echo "==> Container status"
            docker compose -f docker-compose.yml -f docker-compose.override.yml --env-file .env.docker ps
            echo "==> Recent web logs"
            docker compose -f docker-compose.yml -f docker-compose.override.yml --env-file .env.docker logs --tail=50 web

      - name: Record deployed SHA
        if: success()
        run: |
          echo "Deployed SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref_name }}"
          echo "Run: ${{ github.run_id }}"
