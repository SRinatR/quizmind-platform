name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  connected-smoke:
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quizmind
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quizmind"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
    env:
      NODE_ENV: development
      QUIZMIND_RUNTIME_MODE: connected
      API_PORT: 4000
      API_URL: http://127.0.0.1:4000
      APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/quizmind
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      EXTENSION_TOKEN_SECRET: ci-extension-token-secret
      PROVIDER_CREDENTIAL_SECRET: ci-provider-credential-secret
      EMAIL_PROVIDER: noop
      EMAIL_FROM: noreply@quizmind.local
      BILLING_PROVIDER: manual
      OPENROUTER_API_URL: https://openrouter.ai/api/v1
      OPENROUTER_APP_NAME: QuizMind Platform CI
      OPENROUTER_TIMEOUT_MS: 45000
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000
      TRUST_PROXY_HOPS: 1
      QUIZMIND_EXTENSION_STRICT_PLATFORM_ORIGIN: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: corepack pnpm --filter @quizmind/database db:migrate:deploy

      - name: Prisma integration tests (connected runtime)
        run: |
          node --import tsx --test \
            apps/api/test/prisma-auth.integration.test.ts \
            apps/api/test/prisma-platform.integration.test.ts

      - name: API connected runtime smoke check
        run: |
          set -euo pipefail
          corepack pnpm --filter @quizmind/web dev > web.log 2>&1 &
          WEB_PID=$!
          corepack pnpm --filter @quizmind/worker start > worker-connected-smoke.log 2>&1 &
          WORKER_PID=$!
          corepack pnpm --filter @quizmind/api start > api.log 2>&1 &
          API_PID=$!
          cleanup() {
            if kill -0 "$WEB_PID" 2>/dev/null; then
              kill "$WEB_PID"
              wait "$WEB_PID" || true
            fi
            if kill -0 "$WORKER_PID" 2>/dev/null; then
              kill "$WORKER_PID"
              wait "$WORKER_PID" || true
            fi
            if kill -0 "$API_PID" 2>/dev/null; then
              kill "$API_PID"
              wait "$API_PID" || true
            fi
          }
          trap cleanup EXIT

          node scripts/release/worker-smoke-check.mjs \
            --log-file "worker-connected-smoke.log" \
            --timeout-seconds "120" \
            --require-queue-bind "true" \
            --forbid-fallback "true"

          node scripts/release/smoke-check.mjs \
            --api-url "http://127.0.0.1:4000" \
            --web-url "http://127.0.0.1:3000" \
            --timeout-seconds "180" \
            --require-connected "true" \
            --require-zero-validation-issues "true" \
            --require-rate-limit-headers "true" \
            --require-bridge-origin-block "true"

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-connected-smoke-log
          path: api.log

      - name: Upload web log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-connected-smoke-log
          path: web.log

      - name: Upload worker log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: worker-connected-smoke-log
          path: worker-connected-smoke.log
