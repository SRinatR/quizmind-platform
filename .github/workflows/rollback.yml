name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Git commit SHA to roll back to (must exist in repo history)"
        required: true
        type: string
      confirm:
        description: "Type 'yes' to confirm the rollback"
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  rollback:
    name: Rollback to ${{ github.event.inputs.sha }}
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "ERROR: Rollback not confirmed. Set confirm=yes to proceed."
            exit 1
          fi

      - name: Validate SHA format
        run: |
          SHA="${{ github.event.inputs.sha }}"
          if ! echo "$SHA" | grep -qE '^[0-9a-f]{7,40}$'; then
            echo "ERROR: '$SHA' does not look like a valid git SHA."
            exit 1
          fi

      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VPS_HOST || 'ods.uz' }}
          port: ${{ vars.VPS_SSH_PORT || 22 }}
          username: ${{ vars.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            bash ${{ vars.DEPLOY_DIR || '/opt/quizmind-platform' }}/scripts/rollback-server.sh \
              --sha "${{ github.event.inputs.sha }}"

      - name: Smoke check — API health after rollback
        run: |
          BASE="${{ vars.PRODUCTION_API_URL || 'https://ods.uz/api' }}"
          echo "Waiting for API after rollback..."
          for i in $(seq 1 18); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" "${BASE}/health" || true)
            if [ "$status" = "200" ]; then
              echo "API health passed after rollback (HTTP $status)"
              break
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s"
            sleep 10
            if [ "$i" = "18" ]; then
              echo "ERROR: API health failed after rollback — investigate immediately"
              exit 1
            fi
          done

      - name: Smoke check — Site homepage after rollback
        run: |
          URL="${{ vars.PRODUCTION_APP_URL || 'https://ods.uz' }}"
          status=$(curl -sf -o /dev/null -w "%{http_code}" "${URL}" || true)
          if [ "$status" = "200" ]; then
            echo "Site check passed after rollback (HTTP $status)"
          else
            echo "ERROR: Site returned HTTP $status after rollback"
            exit 1
          fi

      - name: Summary
        run: |
          echo "Rollback to ${{ github.event.inputs.sha }} completed."
          echo "Triggered by: ${{ github.actor }}"
          echo "Run ID: ${{ github.run_id }}"
