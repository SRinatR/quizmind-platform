# Production compose override for VPS deployment behind nginx.
#
# Usage:
#   docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env file:
#   APP_URL, API_URL, NEXT_PUBLIC_APP_URL, NEXT_PUBLIC_API_URL,
#   API_INTERNAL_URL, POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD,
#   DATABASE_URL, REDIS_URL,
#   JWT_SECRET, JWT_REFRESH_SECRET, EXTENSION_TOKEN_SECRET, PROVIDER_CREDENTIAL_SECRET,
#   BILLING_PROVIDER, EMAIL_PROVIDER (optional, defaults to noop),
#   CORS_ALLOWED_ORIGINS (comma-separated, e.g. https://ods.uz,chrome-extension://...)
#   TRUST_PROXY_HOPS=1
#
# nginx routes:
#   /      -> web  (WEB_HOST_PORT, default 3000)
#   /api/  -> api  (API_HOST_PORT, default 4000)  [nginx strips /api prefix]

services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    pull_policy: missing
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required in .env.prod}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env.prod}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required in .env.prod}"

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    pull_policy: missing

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    command:
      [
        "sh",
        "-lc",
        'corepack pnpm --filter @quizmind/api start || { code=$$?; echo "api exited with $$code; sleeping before Docker restart"; sleep 30; exit $$code; }'
      ]
    environment:
      NODE_ENV: production
      QUIZMIND_RUNTIME_MODE: connected
      API_PORT: "4000"
      API_URL: "${API_URL:-https://ods.uz/api}"
      APP_URL: "${APP_URL:-https://ods.uz}"
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required in .env.prod}"
      REDIS_URL: "${REDIS_URL:?REDIS_URL is required in .env.prod}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required in .env.prod}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required in .env.prod}"
      EXTENSION_TOKEN_SECRET: "${EXTENSION_TOKEN_SECRET:?EXTENSION_TOKEN_SECRET is required in .env.prod}"
      PROVIDER_CREDENTIAL_SECRET: "${PROVIDER_CREDENTIAL_SECRET:?PROVIDER_CREDENTIAL_SECRET is required in .env.prod}"
      JWT_ISSUER: "${JWT_ISSUER:-${API_URL:-https://ods.uz/api}}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-${APP_URL:-https://ods.uz}}"
      TRUST_PROXY_HOPS: "${TRUST_PROXY_HOPS:-1}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-${APP_URL:-https://ods.uz}}"
      ALLOWED_EXTENSION_ORIGINS: "${ALLOWED_EXTENSION_ORIGINS:-}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-noop}"
      EMAIL_FROM: "${EMAIL_FROM:-noreply@quizmind.local}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      BILLING_PROVIDER: "${BILLING_PROVIDER:-manual}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_API_URL: "${OPENROUTER_API_URL:-https://openrouter.ai/api/v1}"
      PLATFORM_AI_PROVIDER: "${PLATFORM_AI_PROVIDER:-openrouter}"
      ROUTERAI_API_KEY: "${ROUTERAI_API_KEY:-}"
      ROUTERAI_API_URL: "${ROUTERAI_API_URL:-https://routerai.ru/api/v1}"
      ROUTERAI_TIMEOUT_MS: "${ROUTERAI_TIMEOUT_MS:-45000}"
      HISTORY_BLOB_DIR: "${HISTORY_BLOB_DIR:-/app/data/history}"
      RATE_LIMIT_WINDOW_MS: "${RATE_LIMIT_WINDOW_MS:-60000}"
      RATE_LIMIT_MAX_REQUESTS: "${RATE_LIMIT_MAX_REQUESTS:-120}"
      AUTH_RATE_LIMIT_WINDOW_MS: "${AUTH_RATE_LIMIT_WINDOW_MS:-900000}"
      AUTH_RATE_LIMIT_MAX_REQUESTS: "${AUTH_RATE_LIMIT_MAX_REQUESTS:-10}"
    volumes:
      - quizmind_history_data:/app/data/history

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-https://ods.uz}"
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://ods.uz/api}"
    env_file:
      - .env.prod
    working_dir: /app/apps/web
    command:
      [
        "node",
        "/app/node_modules/next/dist/bin/next",
        "start",
        "--hostname",
        "0.0.0.0",
        "--port",
        "3000"
      ]
    environment:
      NODE_ENV: production
      # Internal container-to-container API URL (origin only, no path prefix)
      API_INTERNAL_URL: "${API_INTERNAL_URL:-http://api:4000}"
      # Public-facing URLs used for client-side and validation
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://ods.uz/api}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-https://ods.uz}"
      APP_URL: "${APP_URL:-https://ods.uz}"
      API_URL: "${API_URL:-https://ods.uz/api}"
      REDIS_URL: "${REDIS_URL:?REDIS_URL is required in .env.prod}"
      DEFAULT_PERSONA: "${DEFAULT_PERSONA:-platform-admin}"
      QUIZMIND_EXTENSION_BIND_CODE_STORE_MODE: "${QUIZMIND_EXTENSION_BIND_CODE_STORE_MODE:-optional}"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    command:
      [
        "sh",
        "-lc",
        'corepack pnpm --filter @quizmind/worker start || { code=$$?; echo "worker exited with $$code; sleeping before Docker restart"; sleep 30; exit $$code; }'
      ]
    environment:
      NODE_ENV: production
      QUIZMIND_RUNTIME_MODE: connected
      API_URL: "${API_INTERNAL_URL:-http://api:4000}"
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required in .env.prod}"
      REDIS_URL: "${REDIS_URL:?REDIS_URL is required in .env.prod}"
      WORKER_HEARTBEAT_MS: "${WORKER_HEARTBEAT_MS:-30000}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-noop}"
      EMAIL_FROM: "${EMAIL_FROM:-noreply@quizmind.local}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      HISTORY_BLOB_DIR: "${HISTORY_BLOB_DIR:-/app/data/history}"
    volumes:
      - quizmind_history_data:/app/data/history

volumes:
  quizmind_history_data:
