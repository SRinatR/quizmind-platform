services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    pull_policy: always
    container_name: quizmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_USER: "${POSTGRES_USER}"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - quizmind_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    pull_policy: always
    container_name: quizmind-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - quizmind_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizmind-api
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "corepack pnpm --filter @quizmind/database db:migrate:deploy && corepack pnpm --filter @quizmind/database db:seed && corepack pnpm --filter @quizmind/api start"
      ]
    environment:
      NODE_ENV: development
      QUIZMIND_RUNTIME_MODE: connected
      API_PORT: 4000
      API_URL: "http://localhost:${API_HOST_PORT:-4000}"
      APP_URL: "http://localhost:${WEB_HOST_PORT:-3000}"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET:-quizmind-local-jwt-secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-quizmind-local-refresh-secret}"
      EMAIL_FROM: noreply@quizmind.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-4000}:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizmind-web
    restart: unless-stopped
    working_dir: /app/apps/web
    command:
      [
        "node",
        "/app/node_modules/next/dist/bin/next",
        "dev",
        "--turbopack",
        "--hostname",
        "0.0.0.0",
        "--port",
        "3000"
      ]
    environment:
      NODE_ENV: development
      API_INTERNAL_URL: "http://api:4000"
      NEXT_PUBLIC_API_URL: "http://localhost:${API_HOST_PORT:-4000}"
      NEXT_PUBLIC_APP_URL: "http://localhost:${WEB_HOST_PORT:-3000}"
      DEFAULT_PERSONA: platform-admin
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizmind-worker
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "corepack pnpm --filter @quizmind/database db:migrate:deploy && corepack pnpm --filter @quizmind/worker start"
      ]
    environment:
      NODE_ENV: development
      QUIZMIND_RUNTIME_MODE: connected
      API_URL: "http://api:4000"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "redis://redis:6379"
      WORKER_HEARTBEAT_MS: 30000
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  quizmind_postgres_data:
  quizmind_redis_data:
