global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: production
    site: ods.uz

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # API application metrics
  - job_name: quizmind_api
    static_configs:
      - targets: ["quizmind-api:4000"]
    metrics_path: /metrics

  # Worker application metrics
  - job_name: quizmind_worker
    static_configs:
      - targets: ["quizmind-worker:9091"]
    metrics_path: /metrics

  # Host node metrics
  - job_name: node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Container metrics
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    metric_relabel_configs:
      # Drop high-cardinality metrics we don't need
      - source_labels: [__name__]
        regex: 'container_(tasks_state|memory_failures_total)'
        action: drop

  # Postgres metrics
  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis metrics
  - job_name: redis_exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  # External blackbox probes
  - job_name: blackbox_http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://ods.uz/api/health
          - https://ods.uz
          - https://www.ods.uz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
