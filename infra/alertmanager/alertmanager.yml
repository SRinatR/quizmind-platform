# Alertmanager configuration for quizmind-platform
#
# Notification channels use placeholder values.
# Set real values via environment variables or edit this file directly on the server.
# Do NOT commit real secrets to this file.
#
# Supported receivers shown below: Slack webhook, email SMTP, PagerDuty.
# Uncomment and fill in whichever you use.

global:
  resolve_timeout: 5m

  # SMTP for email alerts (optional)
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alerts@ods.uz'
  # smtp_auth_username: 'alerts@ods.uz'
  # smtp_auth_password: '${ALERTMANAGER_SMTP_PASSWORD}'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    - matchers:
        - severity = critical
      receiver: 'critical'
      repeat_interval: 1h

    - matchers:
        - severity = warning
      receiver: 'default'
      repeat_interval: 4h

receivers:
  - name: 'default'
    # Replace with your actual notification target.
    # Example: Slack webhook
    # slack_configs:
    #   - api_url: '${ALERTMANAGER_SLACK_WEBHOOK_URL}'
    #     channel: '#alerts'
    #     send_resolved: true
    #     title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    webhook_configs:
      - url: 'http://localhost:9999/noop'
        send_resolved: true
        # Placeholder — replace with real webhook URL or remove and use slack_configs/email_configs

  - name: 'critical'
    # Same as default — wire in a paging channel here for critical alerts.
    # pagerduty_configs:
    #   - service_key: '${ALERTMANAGER_PAGERDUTY_SERVICE_KEY}'
    webhook_configs:
      - url: 'http://localhost:9999/noop'
        send_resolved: true

inhibit_rules:
  # If the site is completely down, suppress individual probe alerts
  - source_matchers:
      - alertname = "SiteDown"
    target_matchers:
      - alertname = "ApiHealthDown"
    equal: ['environment']
